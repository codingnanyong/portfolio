server {
    listen 80;
    server_name localhost;
    # integrated-swagger 는 클러스터 DNS 이름이 안정적 — 동적 proxy_pass(변수+경로)는 502 유발

    root /usr/share/nginx/html;
    index index.html;

    # 새 배포 후에도 브라우저가 예전 index.html(옛 해시 JS)을 붙잡지 않도록
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API 프록시 → integrated-swagger-service:80 (Service port 80 → Pod 8000)
    location /openapi.json {
        proxy_pass http://integrated-swagger-service.flet-montrg.svc.cluster.local:80/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://integrated-swagger-service.flet-montrg.svc.cluster.local:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }
}
