apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thresholds-service-network-policy
  namespace: flet-montrg
spec:
  podSelector:
    matchLabels:
      app: thresholds-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}  # 우선 전체 허용(문제 분리 후 좁히기)
  egress:
  # PostgreSQL — DATABASE_URL 호스트(예: 172.18.0.10 storage_network, 203.x)와 CNI 라우트가 맞아야 함
  - to: []
    ports:
    - protocol: TCP
      port: 5432
  - to: []  # DNS
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
